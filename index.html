      background-attachment: fixed;
      background-size: cover;
      background-position: center center;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      padding: 24px 16px 40px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(8,6,4,0.85) 0%, rgba(14,10,6,0.78) 50%, rgba(6,4,2,0.90) 100%);
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      z-index: 1;
      pointer-events: none;
      opacity: 0.4;
    }

    .particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
    .particle {
      position: absolute; width: 1px; height: 1px;
      background: var(--cream); border-radius: 50%;
      animation: float linear infinite; opacity: 0;
    }
    @keyframes float {
      0% { transform: translateY(100vh); opacity: 0; }
      10% { opacity: 0.25; } 90% { opacity: 0.25; }
      100% { transform: translateY(-100px); opacity: 0; }
    }

    .container { width: 100%; max-width: 560px; position: relative; z-index: 10; }
    .header { text-align: center; margin-bottom: 16px; animation: fadeDown 0.7s ease; }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 32px; font-weight: 900; letter-spacing: 8px;
      color: var(--white);
      display: inline-block;
      text-transform: uppercase;
    }

    .card {
      background: rgba(20, 18, 18, 0.88);
      border: 1px solid var(--border);
      border-radius: 4px; padding: 24px 28px;
      position: relative; overflow: hidden;
      box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 1px 0 rgba(223,216,208,0.06) inset;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .card-top-line {
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cream), transparent);
      opacity: 0.25;
    }

    .section-label {
      font-family: 'DM Sans', sans-serif; font-size: 9px; letter-spacing: 4px;
      color: var(--dim); text-transform: uppercase; margin-bottom: 10px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-label::after { content:''; flex:1; height:1px; background: var(--border); }

    .mode-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .mode-option { position: relative; }
    .mode-option input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
    .mode-option label {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 12px 10px; border: 1px solid rgba(223,216,208,0.18); border-radius: 3px;
      cursor: pointer; transition: all 0.25s ease; background: rgba(32,32,32,0.6);
      font-size: 11px; font-weight: 600; letter-spacing: 2px; color: rgba(223,216,208,0.45);
      text-transform: uppercase;
    }
    .mode-option label .icon { font-size: 18px; }
    .mode-option input:checked + label {
      border-color: var(--bronze);
      background: var(--bronze);
      color: var(--black);
      box-shadow: 0 4px 20px rgba(193,166,135,0.25);
    }
    .mode-option label:hover { border-color: var(--bronze); color: var(--bronze); background: rgba(193,166,135,0.08); }

    .count-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    .count-option { position: relative; }
    .count-option input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
    .count-option label {
      display: flex; align-items: center; justify-content: center;
      padding: 11px; border: 1px solid rgba(223,216,208,0.18); border-radius: 3px;
      cursor: pointer; transition: all 0.25s ease;
      font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700;
      color: rgba(223,216,208,0.35); background: rgba(32,32,32,0.6); flex-direction: column; gap: 2px;
    }
    .count-option label .qlabel { font-size: 8px; font-weight: 400; letter-spacing: 2px; font-family: 'DM Sans', sans-serif; text-transform: uppercase; }
    .count-option input:checked + label {
      border-color: var(--bronze);
      background: var(--black);
      color: var(--bronze);
      box-shadow: inset 0 0 0 1px var(--bronze), 0 4px 20px rgba(193,166,135,0.2);
    }
    .count-option label:hover { border-color: var(--bronze); color: var(--bronze); background: rgba(193,166,135,0.08); }

    .btn-start {
      width: 100%; padding: 14px; background: var(--bronze);
      border: 1px solid var(--bronze); border-radius: 3px; color: var(--black);
      font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase; cursor: pointer;
      position: relative; overflow: hidden; transition: all 0.25s ease;
      box-shadow: 0 4px 24px rgba(193,166,135,0.25);
    }
    .btn-start:hover {
      background: var(--black); border-color: var(--bronze); color: var(--bronze);
      transform: translateY(-2px); box-shadow: 0 10px 32px rgba(193,166,135,0.3);
    }
    .btn-start:active { transform: translateY(0); box-shadow: none; }
    .btn-start span { position:relative; z-index:1; }

    .progress-wrap { margin-bottom: 14px; }
    .progress-info { display:flex; justify-content:space-between; font-size:10px; letter-spacing:2px; color:var(--dim); margin-bottom:8px; text-transform: uppercase; }
    .progress-bar { height:1px; background:rgba(223,216,208,0.1); overflow:hidden; }
    .progress-fill { height:100%; background: var(--cream); transition:width 0.6s cubic-bezier(0.4,0,0.2,1); }

    .question-text {
      font-family: 'Playfair Display', serif;
      font-size: 17px; font-weight: 400; line-height: 1.5;
      color: var(--white); margin-bottom: 16px; min-height: 50px;
    }

    .timer-wrap { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .timer-arc { position:relative; width:40px; height:40px; flex-shrink:0; }

    { question: "PrismaX's service layer advances intelligence for...?", answers: ["Physical AI", "Abstract AI", "Financial AI", "Gaming AI"], correct: 0 },

    { question: "The future PrismaX is building: mainstream adoption of...?", answers: ["Robotics", "Isolation", "Manual only", "No tech"], correct: 0 },
    { question: "What event does @PrismaXai host?", answers: ["RoboCon_AI", "ETHDenver only", "Devcon", "NFT.NYC"], correct: 0 },

    { question: "PrismaX Co-Founder & CEO spoke on scaling Physical AI at...?", answers: ["Futurllama Stage", "Main stage only", "No stage", "Twitter Spaces"], correct: 0 },

    { question: "PrismaX events feature panels on affordable power for AI and...?", answers: ["Robots", "Phones", "Cars", "Laptops"], correct: 0 },
    { question: "What hashtag for photos with PrismaX robots at events?", answers: ["#ProofOfRobots", "#HODL", "#GM", "#LFG"], correct: 0 },
    { question: "PrismaX team at events lets you teleop a real robot arm — feels like...?", answers: ["Real-life video game", "Boring demo", "Lecture", "Nothing"], correct: 0 },
    { question: "PrismaX merch giveaway at events for completing...?", answers: ["Photo quests with robots", "Surveys", "Codes", "Nothing"], correct: 0 },
    { question: "From Models to Machines panel featured PrismaX CEO alongside...?", answers: ["Other AI/robotics leaders", "Solo", "No one", "Memers"], correct: 0 },
    { question: "PrismaX shows up at crypto events like EthereumDenver to demo...?", answers: ["Real robots", "Whitepapers", "Tokens", "Jokes"], correct: 0 },
    { question: "RoboCon_AI focuses on bridging robotics with...?", answers: ["Mainstream & crypto", "Labs only", "Past tech", "No bridge"], correct: 0 },
    { question: "PrismaX community can join to become robot...?", answers: ["Operators", "Viewers", "Critics", "Nothing"], correct: 0 },
    { question: "Events like ETHDenver let you say hi to the PrismaX...?", answers: ["Team", "Bots only", "No one", "Competitors"], correct: 0 },
    { question: "PrismaX pushes robotics mindshare growth through events and...?", answers: ["Real demos", "Hype posts", "Silence", "Ads"], correct: 0 },
    { question: "What stage hosted PrismaX talk on scaling Physical AI?", answers: ["Futurllama", "Main crypto", "Gaming", "None"], correct: 0 },
    { question: "PrismaX's RoboCon is about accelerating the robotics...?", answers: ["Revolution", "Slowdown", "End", "Joke"], correct: 0 },
    { question: "Join PrismaX at prismax.ai to help shape the future of...?", answers: ["Physical AI & robots", "Memes", "Finance only", "Gaming"], correct: 0 },
    { question: "The big vision @PrismaXai is building toward?", answers: ["Mainstream robotics adoption via teleop, data, and autonomy", "Niche labs forever", "Manual everything", "No robots"], correct: 0 },
  ];

  // ===== STATE =====
  let mode, quizCount, selectedQuiz, current, score, selectedAnswer, userAnswers;
  let timerInterval, streak, maxStreak;
  let questionAnswered = false; // guard to prevent double-advance
  let timerLocked = false;      // true once timer expires or Next is clicked
  const TIMER_SECONDS = 15;

  // ===== HELPERS =====
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function buildQuiz(pool, count) {
    const shuffled = shuffle(pool).slice(0, Math.min(count, pool.length));
    return shuffled.map(q => {
      const indexed = q.answers.map((a, i) => ({ text: a, isCorrect: i === q.correct }));
      const shuffledAnswers = shuffle(indexed);
      return {
        question: q.question,
        answers: shuffledAnswers.map(a => a.text),
        correct: shuffledAnswers.findIndex(a => a.isCorrect)
      };
    });
  }

  function startQuiz() {
    mode = document.querySelector('input[name="mode"]:checked').value;
    quizCount = parseInt(document.querySelector('input[name="count"]:checked').value);
    current = 0; score = 0; streak = 0; maxStreak = 0;
    userAnswers = [];
    selectedQuiz = buildQuiz(QUIZ_POOL, quizCount);
    document.getElementById('startScreen').style.display = 'none';
    const qs = document.getElementById('quizScreen');
    qs.style.display = 'block';
    qs.classList.add('pop');
    setTimeout(() => qs.classList.remove('pop'), 400);
    loadQuestion();
  }

  function loadQuestion() {
    clearInterval(timerInterval);
    selectedAnswer = null;
    questionAnswered = false;
    timerLocked = false;

    const q = selectedQuiz[current];
    const pct = (current / selectedQuiz.length) * 100;
    document.getElementById('qLabel').textContent = `Q ${current + 1}`;
    document.getElementById('qTotal').textContent = `${current + 1} / ${selectedQuiz.length}`;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('scoreBadge').textContent = `${score} / ${current}`;
    document.getElementById('questionText').textContent = q.question;
    document.getElementById('timeoutMsg').style.display = 'none'; // FIXED: hide timeout msg

    const answersDiv = document.getElementById('answersDiv');
    answersDiv.innerHTML = '';
    ['A','B','C','D'].slice(0, q.answers.length).forEach((lbl, i) => {
      const btn = document.createElement('button');
      btn.className = 'answer-btn';
      btn.innerHTML = `<span class="idx">${lbl}</span>${q.answers[i]}`;
      btn.onclick = () => selectAnswer(btn, i);
      answersDiv.appendChild(btn);
    });

    document.getElementById('nextBtn').disabled = true;

    const timerWrap = document.getElementById('timerWrap');
    if (mode === 'timer') {
      timerWrap.style.display = 'flex';
      updateTimerArc(TIMER_SECONDS, TIMER_SECONDS);
      startTimer();
    } else {
      timerWrap.style.display = 'none';
    }

    const sb = document.getElementById('streakBadge');
    if (streak >= 2) {
      sb.style.display = 'inline-flex';
      document.getElementById('streakNum').textContent = streak;
    } else {
      sb.style.display = 'none';
    }
  }

  function updateTimerArc(left, total) {
    const arc = document.getElementById('timerArc');
    const num = document.getElementById('timerNum');
    const pct = left / total;
    arc.style.strokeDashoffset = 113 * (1 - pct);
    arc.style.stroke = pct > 0.5 ? '#DFD8D0' : pct > 0.25 ? '#b0a89e' : '#6b6460';
    num.textContent = left;
    num.style.color = pct > 0.25 ? '#DFD8D0' : '#6b6460';
  }

  function startTimer() {
    let left = TIMER_SECONDS;
    timerInterval = setInterval(() => {
      left--;
      updateTimerArc(left, TIMER_SECONDS);
      if (left <= 0) {
        clearInterval(timerInterval);
        if (!timerLocked) {
          timerLocked = true;
          handleTimeout();
        }
      }
    }, 1000);
  }

  // Called when timer hits zero — lock in whatever answer was selected (or none)
  function handleTimeout() {
    questionAnswered = true;
    const correct = selectedQuiz[current].correct;
    const card = document.getElementById('mainCard');

    if (selectedAnswer === correct) {
      // Player had correct answer selected when time ran out — count it!
      streak++;
      maxStreak = Math.max(maxStreak, streak);
      card.classList.add('flash-correct');
      setTimeout(() => card.classList.remove('flash-correct'), 500);
    } else {
      streak = 0;
    }

    lockAnswers();
    document.getElementById('timeoutMsg').style.display = 'block';
    setTimeout(() => recordAndAdvance(), 1200);
  }

  // Lock all answer buttons and reveal correct/wrong styling
  function lockAnswers() {
    const buttons = document.querySelectorAll('.answer-btn');
    const correct = selectedQuiz[current].correct;
    buttons.forEach((b, i) => {
      b.disabled = true;
      if (i === correct) {
        b.classList.add('correct');
      } else if (i === selectedAnswer) {
        b.classList.add('wrong');
      }
    });
    document.getElementById('nextBtn').disabled = true; // hide next — auto-advancing
  }

  function selectAnswer(button, index) {
    // Block if timer already expired or question already locked
    if (timerLocked || questionAnswered) return;

    // Allow changing: clear all visual states first
    document.querySelectorAll('.answer-btn').forEach(b => {
      b.classList.remove('selected');
    });

    // Mark new selection
    selectedAnswer = index;
    button.classList.add('selected');

    if (mode === 'timer') {
      // Timer still running — enable Next so player can submit early
      document.getElementById('nextBtn').disabled = false;
    } else {
      // Free play: lock in immediately and auto-advance
      questionAnswered = true;
      const correct = selectedQuiz[current].correct;
      const card = document.getElementById('mainCard');

      document.querySelectorAll('.answer-btn').forEach((b, i) => {
        b.disabled = true;
        b.classList.remove('selected');
        if (i === correct) b.classList.add('correct');
        else if (i === index) b.classList.add('wrong');
      });

      if (index === correct) {
        streak++; maxStreak = Math.max(maxStreak, streak);
        card.classList.add('flash-correct');
        setTimeout(() => card.classList.remove('flash-correct'), 500);
      } else {
        streak = 0;
        card.classList.add('flash-wrong');
        setTimeout(() => card.classList.remove('flash-wrong'), 500);
      }
      setTimeout(() => recordAndAdvance(), 900);
    }
  }

  // Player clicks Next to submit current selection before timer ends
  function nextQuestion() {
    if (questionAnswered) return; // already processed
    if (timerLocked) return;     // timer expired, already handling

    timerLocked = true;
    clearInterval(timerInterval);
    questionAnswered = true;

    const card = document.getElementById('mainCard');
    const correct = selectedQuiz[current].correct;

    if (selectedAnswer === correct) {
      streak++;
      maxStreak = Math.max(maxStreak, streak);
      card.classList.add('flash-correct');
      setTimeout(() => card.classList.remove('flash-correct'), 500);
    } else if (selectedAnswer !== null) {
      streak = 0;
      card.classList.add('flash-wrong');
      setTimeout(() => card.classList.remove('flash-wrong'), 500);
    }

    // Show correct/wrong then advance
    const buttons = document.querySelectorAll('.answer-btn');
    buttons.forEach((b, i) => {
      b.disabled = true;
      b.classList.remove('selected');
      if (i === correct) b.classList.add('correct');
      else if (i === selectedAnswer) b.classList.add('wrong');
    });
    document.getElementById('nextBtn').disabled = true;

    setTimeout(() => recordAndAdvance(), 600);
  }

  function recordAndAdvance() {
    const correct = selectedQuiz[current].correct;
    userAnswers.push({
      question: selectedQuiz[current].question,
      selected: selectedAnswer, // null if timed out with no selection
      correct,
      answers: selectedQuiz[current].answers
    });
    if (selectedAnswer === correct) score++;
    current++;
    if (current < selectedQuiz.length) {
      loadQuestion();
    } else {
      showResults();
    }
  }

  function showResults() {
    document.getElementById('quizScreen').style.display = 'none';
    const rs = document.getElementById('resultsScreen');
    rs.style.display = 'block';
    const pct = score / selectedQuiz.length;
    const prismaPoints = score * 500 + (pct === 1 ? 1000 : 0);
    document.getElementById('bigScore').textContent = score;
    document.getElementById('totalScore').textContent = `/ ${selectedQuiz.length}`;
    document.getElementById('statAccuracy').textContent = Math.round(pct * 100) + '%';
    document.getElementById('statStreak').textContent = maxStreak;
    document.getElementById('statPoints').textContent = prismaPoints.toLocaleString();

    const ringFill = document.getElementById('ringFill');
    let label, sub;
    if (pct >= 0.9) { label = 'ELITE AGENT'; sub = 'Maximum protocol efficiency achieved 🔥'; }
    else if (pct >= 0.75) { label = 'FIELD OPERATIVE'; sub = 'Strong performance. Keep training.'; }
    else if (pct >= 0.5) { label = 'RECRUIT'; sub = 'Potential detected. Study the protocol.'; }
    else { label = 'TRAINEE'; sub = 'Return to base for re-calibration.'; }

    document.getElementById('resultLabel').textContent = label;
    document.getElementById('resultSub').textContent = sub;
    setTimeout(() => { ringFill.style.strokeDashoffset = 339 * (1 - pct); }, 100);

    const reviewDiv = document.getElementById('reviewDiv');
    reviewDiv.innerHTML = '';
    userAnswers.forEach((a, i) => {
      const pass = a.selected !== null && a.selected === a.correct;
      const div = document.createElement('div');
      div.className = `review-item ${pass ? 'pass' : 'fail'}`;
      div.innerHTML = `
        <div class="q-text">${pass ? '✓' : '✗'} Q${i+1}: ${a.question}</div>
        <div class="a-your">Your answer: <strong>${a.selected !== null ? a.answers[a.selected] : '⏰ Timed out'}</strong></div>
        ${!pass ? `<div class="a-correct">✓ Correct: ${a.answers[a.correct]}</div>` : ''}
      `;
      reviewDiv.appendChild(div);
    });
  }

  function restartQuiz() {
    document.getElementById('resultsScreen').style.display = 'none';
    const ss = document.getElementById('startScreen');
    ss.style.display = 'block';
    ss.classList.add('pop');
    setTimeout(() => ss.classList.remove('pop'), 400);
  }
</script>
